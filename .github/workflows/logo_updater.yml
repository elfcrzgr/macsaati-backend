name: Gece Logo Avcısı

on:
  workflow_dispatch: 

jobs:
  update-logos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - run: npm ci
      
      - name: Eksik Logoları İndir
        run: node logo_masters.js
        
      - name: Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "🖼️ Yeni Logolar Eklendi"
            git pull origin main --rebase
            git push origin main
            echo "✅ Yeni logolar GitHub'a gönderildi."
          else
            echo "İndirilecek yeni logo yoktu."
          fi
