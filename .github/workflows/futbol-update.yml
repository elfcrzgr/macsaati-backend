name: Futbol Otomatik Güncelleyici

on:
  workflow_dispatch:

jobs:
  update-football:
    runs-on: ubuntu-latest
    env:
      # GitHub'ın istediği Node.js 24 geçişini şimdiden onaylayarak uyarıyı kapatıyoruz
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Node.js 20 yerine 24 kullanıyoruz

      - name: Kütüphaneleri Yükle
        run: npm install

      # ==========================================
      # ⚽ FUTBOL ZİNCİRİ
      # ==========================================
      - name: Futbol Verilerini Çek
        run: node fetch_football.js
        continue-on-error: true

      - name: Eksik Futbol Logolarını İndir
        run: node logo_football.js || echo "Futbol logo indirme atlandı"
        continue-on-error: true

      # ==========================================
      # 🚀 GITHUB'A YÜKLEME (GELİŞMİŞ KONTROL)
      # ==========================================
      - name: Git Kimliğini Ayarla ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tüm yeni dosyaları sahneye al
          git add .
          
          # Sadece değişiklik varsa commit ve push yap
          if git diff --staged --quiet; then
            echo "Değişiklik yok, pushlanmıyor."
          else
            git commit -m "⚽ FUTBOL: Veri & Logolar Otomatik Güncellendi ($(date +'%d-%m-%Y %H:%M'))"
            # Çakışmaları botun verisi lehine çöz
            git pull origin main --rebase -X theirs
            git push origin main
            echo "✅ Değişiklikler başarıyla gönderildi."
          fi

      - name: Sonuç Raporu
        run: echo "🚀 İşlem başarıyla tamamlandı."
