name: Mac Saati Otomatik Fikstür Güncelleyici

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      # GitHub'ın istediği Node.js 24 geçişini şimdiden aktif ediyoruz (Uyarıyı siler)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Node.js 20 yerine 24 kullanarak geleceğe hazırlıyoruz

      - name: Kütüphaneleri Yükle
        run: |
          npm install

      # ==========================================
      # ⚽ FUTBOL ZİNCİRİ
      # ==========================================
      - name: Futbol Verilerini Çek
        run: node fetch_football.js

      - name: Eksik Futbol Logolarını İndir
        run: node logo_football.js || echo "Futbol logo indirme atlandı"

      # ==========================================
      # 🏀 BASKETBOL ZİNCİRİ
      # ==========================================
      - name: Basketbol Verilerini Çek
        run: node fetch_basketball.js || echo "Basketbol veri çekme atlandı"

      - name: Eksik Basketbol Logolarını İndir
        run: node logo_basketball.js || echo "Basketbol logo indirme atlandı"

      # ==========================================
      # 🎾 TENİS ZİNCİRİ
      # ==========================================
      - name: Tenis Verilerini Çek
        run: node fetch_tennis.js || echo "Tenis veri çekme atlandı"

      - name: Eksik Tenis Logolarını İndir
        run: node logo_tennis.js || echo "Tenis logo indirme atlandı"

      # ==========================================
      # 🚀 GITHUB'A YÜKLEME (DAHA GÜVENLİ PUSH)
      # ==========================================
      - name: Git Kimliğini Ayarla ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Her şeyi ekle
          git add .
          
          # 2. Değişiklik var mı kontrol et ve commitle
          if git diff --staged --quiet; then
            echo "Değişiklik yok, işlem sonlandırılıyor."
          else
            git commit -m "Veri & Logolar Otomatik Güncellendi: $(date +'%d-%m-%Y %H:%M')"
            
            # 3. Çakışma yönetimi (Rebase)
            git pull origin main --rebase -X theirs
            
            # 4. Gönder
            git push origin main
          fi
