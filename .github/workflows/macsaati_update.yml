name: Mac Saati Otomatik Fikstür Güncelleyici

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' 

      - name: Puppeteer Sistem Kütüphanelerini Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg

      - name: Kütüphaneleri Yükle
        run: npm ci 

      # ==========================================
      # 🚀 VERİ ÇEKME (PARALEL MOD - ZAMAN KAZANDIRIR)
      # ==========================================
      - name: Tüm Spor Verilerini Çek
        run: |
          node fetch_football.js &
          node fetch_basketball.js &
          node fetch_tennis.js &
          wait # Tüm arka plan işlemlerinin bitmesini bekle

      # ==========================================
      # 🖼️ LOGO GÜNCELLEME (MASTER SCRIPT)
      # ==========================================
      - name: Eksik Tüm Logoları İndir
        run: node logo_master.js || echo "Logo indirme atlandı"

      # ==========================================
      # 📤 GITHUB'A PUSH
      # ==========================================
      - name: Değişiklikleri Kontrol Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "Güncellenecek yeni bir veri veya logo bulunamadı."
          else
            git commit -m "Otomatik Güncelleme: $(date +'%d-%m-%Y %H:%M')"
            git pull origin main --rebase -X theirs
            git push origin main
            echo "✅ Veriler ve logolar başarıyla GitHub'a gönderildi."
          fi
