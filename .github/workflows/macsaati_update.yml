name: Mac Saati Otomatik Fikstür Güncelleyici

on:
  schedule:
    - cron: '0 * * * *' # Her saat başında otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch_depth: 1 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' 

      - name: Kütüphaneleri Yükle
        run: npm ci 

      # ==========================================
      # 🚀 VERİ ÇEKME (TEK MOTOR - TÜM SPORLAR)
      # ==========================================
      - name: Tüm Spor Verilerini Çek
        run: node fetch_all.js

      # ==========================================
      # 📤 GITHUB'A PUSH (ÇAKIŞMA ÖNLEYİCİ)
      # ==========================================
      - name: Değişiklikleri Kontrol Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "Güncellenecek yeni bir veri bulunamadı."
          else
            git commit -m "Otomatik Güncelleme: $(date +'%d-%m-%Y %H:%M')"
            git pull origin main --rebase # 🛡️ iMac ile Actions arasındaki çakışmayı önler
            git push origin main
            echo "✅ Tüm branşlar başarıyla GitHub'a gönderildi."
          fi
