name: Mac Saati Otomatik Fikstür Güncelleyici

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı tam 00 geçe otomatik çalışır
  workflow_dispatch: # Actions sekmesinden manuel olarak tetikleme butonu

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Git geçmişini tam çekmek, çakışma çözümü (rebase) için şarttır

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Kütüphaneleri Yükle
        run: |
          npm install

      # ==========================================
      # ⚽ FUTBOL ZİNCİRİ
      # ==========================================
      - name: Futbol Verilerini Çek
        run: node fetch_football.js

      - name: Eksik Futbol Logolarını İndir
        run: node logo_football.js || echo "Futbol logo indirme atlandı"

      # ==========================================
      # 🏀 BASKETBOL ZİNCİRİ
      # ==========================================
      - name: Basketbol Verilerini Çek
        run: node fetch_basketball.js || echo "Basketbol veri çekme atlandı"

      - name: Eksik Basketbol Logolarını İndir
        run: node logo_basketball.js || echo "Basketbol logo indirme atlandı"

      # ==========================================
      # 🎾 TENİS ZİNCİRİ
      # ==========================================
      - name: Tenis Verilerini Çek
        run: node fetch_tennis.js || echo "Tenis veri çekme atlandı"

      - name: Eksik Tenis Logolarını İndir
        run: node logo_tennis.js || echo "Tenis logo indirme atlandı"

      # ==========================================
      # 🚀 GITHUB'A YÜKLEME (ÇAKIŞMA ÖNLEYİCİLİ)
      # ==========================================
      - name: Git Kimliğini Ayarla ve Çakışmaları Ezerek Pushla
        run: |
          # 1. Botun kimliğini tanımla
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Üretilen tüm yeni JSON dosyalarını ve inen logoları sahneye al
          git add .
          
          # 3. Değişiklikleri önce yerelde kaydet (Çakışma önlemek için şart)
          git commit -m "Yerel bot güncellemeleri" || echo "Değişiklik yok"
          
          # 4. Senin manuel eklediğin logoları çek, ÇAKIŞMA OLURSA BOTUN YENİ VERİSİNİ KABUL ET (-X theirs)
          git pull origin main --rebase -X theirs
          
          # 5. Mesajı düzelt ve GitHub'a sorunsuzca gönder
          git commit --amend -m "Veri & Logolar Otomatik Güncellendi: $(date)" || echo "Değişiklik yok"
          git push origin main
