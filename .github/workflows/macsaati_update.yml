name: Mac Saati Otomatik Fikstür Güncelleyici

on:
  schedule:
    - cron: '*/30 * * * *' # Artik 30 dakikada bir calisabilirsin, kota dostudur.
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Sadece son hali alir, klonlamayi hizlandirir.

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' # node_modules'u cache'ler, her seferinde dakikalarca yukleme yapmaz.

      - name: Puppeteer Sistem Kütüphanelerini Kur
        # Puppeteer'in Linux sunucuda calismasi icin bu sarttir.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg

      - name: Kütüphaneleri Yükle
        run: |
          npm ci # 'npm install'dan daha hizli ve guvenlidir.

      # ==========================================
      # ⚽ FUTBOL ZİNCİRİ
      # ==========================================
      - name: Futbol Verilerini Çek
        run: node fetch_football.js

      - name: Eksik Futbol Logolarını İndir
        run: node logo_football.js || echo "Futbol logo atlandı"

      # ==========================================
      # 🏀 BASKETBOL ZİNCİRİ
      # ==========================================
      - name: Basketbol Verilerini Çek
        run: node fetch_basketball.js || echo "Basketbol veri çekme atlandı"

      - name: Eksik Basketbol Logolarını İndir
        run: node logo_basketball.js || echo "Basketbol logo atlandı"

      # ==========================================
      # 🎾 TENİS ZİNCİRİ
      # ==========================================
      - name: Tenis Verilerini Çek
        run: node fetch_tennis.js || echo "Tenis veri çekme atlandı"

      - name: Eksik Tenis Logolarını İndir
        run: node logo_tennis.js || echo "Tenis logo atlandı"

      # ==========================================
      # 🚀 GITHUB'A PUSH
      # ==========================================
      - name: Değişiklikleri Kontrol Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "Her şey güncel, commit edilecek yeni bir şey yok."
          else
            git commit -m "Otomatik Güncelleme: $(date +'%d-%m-%Y %H:%M')"
            git pull origin main --rebase -X theirs
            git push origin main
            echo "✅ Veriler ve logolar başarıyla güncellendi."
          fi
