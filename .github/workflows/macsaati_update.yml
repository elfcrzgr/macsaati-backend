name: Mac Saati Veri Guncelleme

on:
  schedule:
    - cron: '5 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v3

      - name: Node.js Kur
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Bağımlılıkları Yukle
        run: |
          npm init -y
          npm install puppeteer

      - name: Verileri Cek
        run: node fetch.js

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git commit -m "Otomatik Guncelleme: $(date)" || echo "Degisiklik yok"
          git push