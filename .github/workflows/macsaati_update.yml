name: Mac Saati Otomatik Fikstür Güncelleyici

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı çalışır
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      # Node.js 24 uyarısını susturmak için gerekli değişken
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24' # En güncel sürüm

      - name: Kütüphaneleri Yükle
        run: |
          npm install

      # ==========================================
      # ⚽ FUTBOL ZİNCİRİ
      # ==========================================
      - name: Futbol Verilerini Çek
        run: node fetch_football.js

      - name: Eksik Futbol Logolarını İndir
        run: node logo_football.js || echo "Futbol logo indirme atlandı"

      # ==========================================
      # 🏀 BASKETBOL ZİNCİRİ
      # ==========================================
      - name: Basketbol Verilerini Çek
        run: node fetch_basketball.js || echo "Basketbol veri çekme atlandı"

      - name: Eksik Basketbol Logolarını İndir
        run: node logo_basketball.js || echo "Basketbol logo indirme atlandı"

      # ==========================================
      # 🎾 TENİS ZİNCİRİ
      # ==========================================
      - name: Tenis Verilerini Çek
        run: node fetch_tennis.js || echo "Tenis veri çekme atlandı"

      - name: Eksik Tenis Logolarını İndir
        run: node logo_tennis.js || echo "Tenis logo indirme atlandı"

      # ==========================================
      # 🚀 GITHUB'A PUSH (Akıllı Kontrol)
      # ==========================================
      - name: Değişiklikleri Kontrol Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Yeni inen tüm logoları ve güncellenen JSON'ları ekle
          git add .
          
          # Eğer commit edilecek bir şey yoksa (dosyalar değişmediyse) işlemi bitir
          if git diff --staged --quiet; then
            echo "Güncellenecek yeni bir veri veya logo bulunamadı."
          else
            git commit -m "Veri & Logolar Otomatik Güncellendi: $(date +'%d-%m-%Y %H:%M')"
            
            # Çakışma olursa (manuel logo yüklediysen) botun verisini koru
            git pull origin main --rebase -X theirs
            
            git push origin main
            echo "✅ Değişiklikler başarıyla GitHub'a gönderildi."
          fi
