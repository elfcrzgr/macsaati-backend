name: Mac Saati Veri Guncelleme

on:
  schedule:
    # Her gece Türkiye saatiyle 00:05'te otomatik çalışır (UTC 21:05)
    - cron: '5 21 * * *'
  workflow_dispatch:
    # Bu seçenek iPhone'dan manuel tetiklemeni sağlar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v3

      - name: Node.js Kur
        uses: actions/status-node@v3
        with:
          node-version: '20'

      - name: Bağımlılıkları Yükle
        run: npm install puppeteer

      - name: Verileri Cek (Node.js)
        run: node fetch.js

      - name: Degisiklikleri Kaydet ve Push Et
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add matches.json
          git commit -m "Otomatik Mac Saati Guncellemesi: $(date)" || echo "Degisiklik yok"
          git push