name: Manuel Tenis Logo Güncelleyici (Sadece Logo)

on:
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  update-logos:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sistem Bağımlılıklarını ve Tarayıcıyı Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release xdg-utils
          npm install
          npx puppeteer browsers install chrome

      - name: Tüm Eksik Logoları İndir (Master Script)
        run: node logo_masters.js # BURASI GÜNCELLENDİ
        env:
          NODE_ENV: production

      - name: Değişiklikleri GitHub'a Gönder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "Yeni indirilen logo yok, commit yapılmadı."
          else
            git commit -m "Logolar Güncellendi (Master): $(date +'%d-%m-%Y %H:%M')"
            git pull origin main --rebase
            git push origin main
            echo "✅ Yeni logolar başarıyla repona eklendi."
          fi
