name: Mac Saati - Tenis Otomatik Güncelleyici

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı çalışır
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  update-tennis:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Puppeteer ve Sistem Bağımlılıklarını Kur
        # Puppeteer'ın Ubuntu üzerinde çalışması için bu kütüphaneler şarttır
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg
          npm install

      # ==========================================
      # 🎾 TENİS ZİNCİRİ
      # ==========================================
      - name: Tenis Verilerini Çek
        run: node fetch_tennis.js || echo "Tenis veri çekme atlandı"

      - name: Eksik Tenis Logolarını İndir (Puppeteer)
        run: node logo_tennis.js || echo "Tenis logo indirme atlandı"

      # ==========================================
      # 🚀 GITHUB'A PUSH
      # ==========================================
      - name: Değişiklikleri Kontrol Et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "Güncellenecek yeni bir tenis verisi veya logosu bulunamadı."
          else
            git commit -m "Tenis Veri & Logoları Güncellendi: $(date +'%d-%m-%Y %H:%M')"
            git pull origin main --rebase -X theirs
            git push origin main
            echo "✅ Tenis güncellemeleri başarıyla GitHub'a gönderildi."
          fi
