name: Manuel Tenis Veri ve Logo Güncelleyici

on:
  workflow_dispatch: # Sadece manuel başlatma butonu aktif

jobs:
  manual-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Bağımlılıkları Kur
        # Puppeteer'ın Linux'ta çalışması için gereken kütüphaneleri ve npm paketlerini kurar
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg
          npm install

      - name: Tenis Verilerini Çek
        run: node fetch_tennis.js || echo "Veri çekme başarısız"

      - name: Eksik Tenis Logolarını İndir
        run: node logo_tennis.js || echo "Logo indirme başarısız"

      - name: Değişiklikleri GitHub'a Gönder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "Herhangi bir değişiklik yok."
          else
            git commit -m "Manuel Tenis Güncellemesi: $(date +'%d-%m-%Y %H:%M')"
            git pull origin main --rebase -X theirs
            git push origin main
            echo "✅ Değişiklikler başarıyla gönderildi."
          fi
