name: Manuel Tenis Logo Güncelleyici (Sadece Logo)

on:
  workflow_dispatch: # Sadece butonla çalışır

jobs:
  update-logos:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Puppeteer ve Sistem Bağımlılıklarını Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg
          npm install

      # FETCH ADIMI KALDIRILDI - Direkt logolara geçiyoruz
      - name: Eksik Tenis Logolarını İndir
        run: node logo_tennis.js || echo "Logo indirme başarısız"

      - name: Değişiklikleri GitHub'a Gönder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "Yeni indirilen logo yok."
          else
            git commit -m "Tenis Logoları Güncellendi: $(date +'%d-%m-%Y %H:%M')"
            git pull origin main --rebase -X theirs
            git push origin main
            echo "✅ Yeni logolar başarıyla repona eklendi."
          fi
